version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: homesphere-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: homesphere_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: homesphere-redis
    ports:
      - "6379:6379"

  backend-api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: homesphere-api
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/code
    environment:
      - DATABASE_URL=postgresql://postgres:password123@postgres:5432/homesphere_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHONUNBUFFERED=1
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
