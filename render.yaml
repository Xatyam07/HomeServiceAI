services:
  # 1. Core API Backend Service (FastAPI)
  - type: web
    name: homesphere-api
    env: python
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: 6379

  # 2. NextJS Client Web Service
  - type: web
    name: homesphere-web
    env: node
    rootDir: apps/web
    buildCommand: npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://homesphere-api.onrender.com
